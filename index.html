<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
</head>

<style>
    body{
        font-family: 'Lucida Sans';
        background-color: #3498db;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #form-container{
        background-color: white;
        padding: 50px;
        text-align: center;
    }
    
    h2{
        margin: 0px 0px 10px 0px;
    }
    
    input{
        width: 200px;
        margin: 10px 0px;
        padding: 10px;
        outline: none;
    }

    input[type='submit']{
        width: 224px;
        border: 0px;
        background-color: #3498db;
        color: white;
    }

    .error{
        color: red;
        margin: 0px;
        text-align: left;
        font-size: 15px;
    }

    </style>
<body>
    <div id="form-container">
        <h2>Login</h2>
        <form action="" onsubmit="return validationForm()">
            <input type="text" placeholder="User Name" id="username"> <br>
            <p id="user-error" class="error"></p>
            <input type="password" placeholder="Password" id="password"> <br>
            <p id="password-error" class="error"></p>
            <input type="submit" > 
        </form>
    </div>

    <script>

        let userName = document.getElementById('username');
        let password = document.getElementById('password');
        let flag = 1;
        

        function validationForm(){
            if (userName.value == "") {
                document.getElementById('user-error').innerHTML = "User Name is empty"
                flag = 0;
            }else if(userName.value.length < 4){
                document.getElementById('user-error').innerHTML = "User Name required minimun 4 char"
                flag = 0;
            }else{
                document.getElementById('user-error').innerHTML = "";
                flag = 1;
            }
            
            if (password.value == "") {
                document.getElementById('password-error').innerHTML = "Password is empty";
                flag = 0;
            }else if(password.value.length < 6){
                document.getElementById('password-error').innerHTML = "password required minimum 6 char";
                flag = 0;
            }else{
                document.getElementById('password-error').innerHTML = "";
                flag = 1;
            }

            if (flag) {
                return true;
            }else{
                return false;
            }
        }

    </script>
</body>
</html>
